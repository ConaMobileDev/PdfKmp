name: Publish to Maven Central

# Triggered when a GitHub Release is published. The release tag determines the
# version that gets shipped — make sure `gradle.properties` carries the matching
# `VERSION_NAME` (no `-SNAPSHOT`) before tagging.
on:
  release:
    types: [published]
  workflow_dispatch:  # allows manual runs from the Actions tab

jobs:
  publish:
    # macOS so the iOS Kotlin/Native targets can be linked alongside the JVM /
    # Android artefacts. Linux runners can't produce iOS frameworks.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew :pdfkmp:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
